services:
  app:
    build:
      context: .
      target: dev
    hostname: podkeep-app
    volumes:
      - ./src:/var/www/html
    environment:
      - PHP_FPM_LISTEN=0.0.0.0:9000
      - RUN_MIGRATIONS=true
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app

  web:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app

  worker:
    build:
      context: .
      target: dev
    hostname: podkeep-worker
    command: php -d memory_limit=512M artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app

networks:
  app:
    driver: bridge
